<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budy.Study Checkout</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #1c2333;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --brand: #1a56db;
      --brand-dark: #1440b0;
      --line: #334155;
      --ok: #10b981;
      --nav-h: 64px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Sora, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1a56db33 0%, transparent 35%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: calc(var(--nav-h) + 24px) 24px 24px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
    }

    #nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 900;
      height: var(--nav-h);
      background: rgba(13, 17, 23, 0.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-inner {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
    }

    .nav-logo-img {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .top-btn.ghost {
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.14);
      color: rgba(240,244,255,.7);
    }

    .top-btn.ghost:hover {
      background: rgba(255,255,255,.14);
      color: #fff;
    }

    .top-btn.gold {
      background: #f59e0b;
      color: #0d1117;
      font-weight: 800;
      border: 1.5px solid transparent;
    }

    .top-btn.gold:hover {
      background: #fbbf24;
    }

    .page {
      min-height: calc(100vh - var(--nav-h));
      display: grid;
      place-items: center;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .row {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status {
      margin-top: 18px;
      color: var(--ok);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    a.primary {
      background: var(--brand);
      color: #fff;
    }

    a.primary:hover { background: var(--brand-dark); }

    a.ghost {
      border-color: var(--line);
      color: var(--text);
    }

    a.ghost:hover {
      border-color: #64748b;
      background: #0f172a;
    }
  </style>
</head>
<body>
  <nav id="nav" aria-label="Main navigation">
    <div class="wrap nav-inner">
      <a href="/" class="nav-logo">
        <img src="/assets/budy-logo.jpg" alt="Budy logo" class="nav-logo-img">
        Budy.Study
      </a>
      <div class="nav-right">
        <a class="top-btn ghost" href="/">Home</a>
        <a class="top-btn gold" href="/login.html">Log In</a>
      </div>
    </div>
  </nav>

  <div class="page">
  <main class="card">
    <h1>Checkout Route Ready</h1>
    <p>
      This page confirms your <strong>/checkout</strong> route is live. Connect your Stripe Checkout
      session API next to enable one-click upgrades.
    </p>

    <div class="row">
      <span>Webhook destination</span>
      <span>/api/stripe-webhook</span>
    </div>

    <p class="status">Stripe setup status: endpoint path is now in place.</p>

    <div class="actions">
      <a class="btn primary" href="/">Back to Home</a>
      <a class="btn ghost" href="/login.html">Open Login</a>
    </div>
  </main>
  </div>
</body>
</html>
