<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budy.Study Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --card: #1c2333;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --brand: #1a56db;
      --brand-dark: #1440b0;
      --line: #334155;
      --ok: #10b981;
      --nav-h: 64px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Sora, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1a56db33 0%, transparent 35%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: calc(var(--nav-h) + 24px) 24px 24px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* NAV — all styles handled by shared-navbar-styles in navbar.html */

    .page {
      min-height: calc(100vh - var(--nav-h));
      display: grid;
      place-items: center;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .row {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status {
      margin-top: 18px;
      color: var(--ok);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    a.primary {
      background: var(--brand);
      color: #fff;
    }

    a.primary:hover { background: var(--brand-dark); }

    a.ghost {
      border-color: var(--line);
      color: var(--text);
    }

    a.ghost:hover {
      border-color: #64748b;
      background: #0f172a;
    }
  </style>
</head>
<body>
  <div id="navbar-slot"></div>
<script src="/navbar-loader.js" defer></script>

  <div class="page">
  <main class="card">
    <h1>Checkout Route Ready</h1>
    <p>
      This page confirms your <strong>/checkout</strong> route is live. Connect your Stripe Checkout
      session API next to enable one-click upgrades.
    </p>

    <div class="row">
      <span>Webhook destination</span>
      <span>/api/stripe-webhook</span>
    </div>

    <p class="status">Stripe setup status: endpoint path is now in place.</p>

    <div class="actions">
      <a class="btn primary" href="/">Back to Home</a>
      <a class="btn ghost" href="/login.html">Open Login</a>
    </div>
  </main>
  </div>
</body>
</html>
