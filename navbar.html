<style id="shared-navbar-styles">
  :root { --shared-nav-h: 64px; }

  #nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 900;
    height: var(--shared-nav-h);
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(0,0,0,.06);
    transition: box-shadow .3s;
  }

  #nav.scrolled { box-shadow: 0 4px 20px rgba(0,0,0,.09); }

  #nav .wrap { max-width: 1120px; margin: 0 auto; padding: 0 20px; }

  #nav .nav-inner {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #nav .nav-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    font-family: 'Sora', system-ui, sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    color: #1a56db;
    text-decoration: none;
    background: transparent;
    border: none;
    box-shadow: none;
  }

  #nav .nav-logo-img {
    width: 44px;
    height: 44px;
    margin: 0;
    padding: 0;
    border: 0;
    border-radius: 0;
    background: transparent;
    object-fit: contain;
    object-position: center;
    display: block;
    flex-shrink: 0;
    filter: none;
    box-shadow: none;
  }

  #nav .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #nav .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    white-space: nowrap;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Sora', system-ui, sans-serif;
    font-weight: 700;
    transition: all .2s cubic-bezier(0.16,1,0.3,1);
  }

  #nav .btn-sm { height: 40px; padding: 0 20px; font-size: .8375rem; }

  #nav .btn-ghost {
    background: transparent;
    color: #4a5568;
    border: 2px solid #e2e8f0;
  }

  #nav .btn-ghost:hover { border-color: #1a56db; color: #1a56db; background: #eff6ff; }

  #nav .btn-primary {
    background: #1a56db;
    color: #fff;
    box-shadow: 0 4px 20px rgba(26,86,219,.35);
  }

  #nav .btn-primary:hover {
    background: #1440b0;
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(26,86,219,.45);
  }

  /* Account page variant: make Home + Log In/Out pills cleaner and more visible */
  #nav.nav-account-mode #nav-link-account,
  #nav.nav-account-mode #auth-btn {
    background: transparent;
    color: #4a5568;
    border: 2px solid #e2e8f0;
    border-radius: 999px;
  }

  #nav.nav-account-mode #nav-link-account:hover,
  #nav.nav-account-mode #auth-btn:hover {
    border-color: #1a56db;
    color: #1a56db;
    background: #eff6ff;
  }

  #nav.nav-account-mode {
    background: #ffffff;
    backdrop-filter: none;
  }

  #nav .nav-link-hide { display: none; }
  #nav .mobile-menu-wrap { display: none; position: relative; }
  #nav .mobile-menu-btn {
    height: 40px;
    padding: 0 14px;
    border-radius: 999px;
    font-size: .8125rem;
    font-weight: 700;
    border: 2px solid rgba(13,17,23,.15);
    background: #fff;
    color: #0d1117;
  }

  #nav .mobile-menu-panel {
    position: absolute;
    right: 0;
    top: 48px;
    min-width: 220px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    box-shadow: 0 12px 48px rgba(0,0,0,.13);
    padding: 8px;
    display: none;
    z-index: 30;
  }

  #nav .mobile-menu-panel.open { display: block; }

  #nav .mobile-menu-link {
    display: block;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: .875rem;
    font-weight: 700;
    color: #0d1117;
    text-decoration: none;
  }

  #nav .mobile-menu-link:hover { background: #f7f8fc; }

  @media(min-width:640px) {
    #nav .nav-link-hide { display: inline-flex; }
  }

  @media(max-width:860px) {
    #nav .nav-right > .btn.btn-ghost.btn-sm:not(#auth-btn):not(.mobile-menu-btn),
    #nav .nav-right > #auth-btn,
    #nav .nav-right > .btn.btn-primary.btn-sm {
      display: none;
    }

    #nav .mobile-menu-wrap { display: block; }
  }
</style>

<nav id="nav" aria-label="Main navigation">
  <div class="wrap nav-inner">
    <a href="/" class="nav-logo">
      <img src="/assets/budy-logo.png" alt="Budy logo" class="nav-logo-img">
      Budy.Study
    </a>
    <div class="nav-right">
      <a href="/#features" class="btn btn-ghost btn-sm nav-link-hide" id="nav-link-why">Why Budy?</a>
      <a href="/#solutions" class="btn btn-ghost btn-sm nav-link-hide" id="nav-link-features">Features</a>
      <a href="/#pricing" class="btn btn-ghost btn-sm nav-link-hide" id="nav-link-pricing">Pricing</a>
      <a class="btn btn-ghost btn-sm" href="/my-account.html" id="nav-link-account">My Account</a>
      <button class="btn btn-ghost btn-sm" id="auth-btn" onclick="handleAuthButton()">Log In</button>
      <button class="btn btn-primary btn-sm" onclick="openOnboard()">Start Free Test</button>
      <div class="mobile-menu-wrap">
        <button class="btn btn-primary btn-sm" onclick="openOnboard()">Start Free Test</button>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">Menu ▾</button>
        <div class="mobile-menu-panel" id="mobile-menu-panel">
          <a class="mobile-menu-link" href="/#features" onclick="closeMobileMenu()" id="nav-m-link-why">Why Budy?</a>
          <a class="mobile-menu-link" href="/#solutions" onclick="closeMobileMenu()" id="nav-m-link-features">Features</a>
          <a class="mobile-menu-link" href="/#pricing" onclick="closeMobileMenu()" id="nav-m-link-pricing">Pricing</a>
          <a class="mobile-menu-link" href="/my-account.html" onclick="closeMobileMenu()" id="nav-m-link-account">My Account</a>
          <a class="mobile-menu-link" href="/login.html" onclick="closeMobileMenu()" id="mobile-auth-link">Log In</a>
        </div>
      </div>
    </div>
  </div>
</nav>
