<style id="shared-navbar-styles">
  :root { --shared-nav-h: 64px; }

  * {
    scrollbar-width: thin;
    scrollbar-color: rgba(140, 168, 215, 0.55) rgba(7, 18, 37, 0.92);
  }

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }

  ::-webkit-scrollbar-track {
    background: rgba(7, 18, 37, 0.92);
  }

  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(69, 117, 207, 0.95), rgba(40, 80, 160, 0.95));
    border-radius: 999px;
    border: 2px solid rgba(7, 18, 37, 0.92);
  }

  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(96, 142, 231, 0.95), rgba(57, 100, 187, 0.95));
  }

  #nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 900;
    padding-top: env(safe-area-inset-top, 0px);
    height: calc(var(--shared-nav-h) + env(safe-area-inset-top, 0px));
    background: #071225;
    border-bottom: 1px solid rgba(255, 255, 255, 0.09);
    backdrop-filter: blur(12px);
    transition: box-shadow 0.2s ease;
  }

  #nav.scrolled { box-shadow: 0 6px 26px rgba(0, 0, 0, 0.34); }

  #nav .wrap { max-width: 1120px; margin: 0 auto; padding: 0 20px; }

  #nav .nav-inner {
    height: var(--shared-nav-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #nav .nav-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Sora', system-ui, sans-serif;
    font-size: 1.66rem;
    font-weight: 800;
    color: #ffffff;
    text-decoration: none;
  }

  #nav .nav-logo-wordmark {
    display: inline-flex;
    align-items: baseline;
    gap: 0;
    line-height: 1;
  }

  #nav .nav-logo-study {
    color: #f59e0b;
    margin-left: 0;
  }

  #nav .nav-logo-img {
    width: 56px;
    height: 56px;
    margin: 0;
    padding: 0;
    border: 0;
    border-radius: 0;
    background: transparent;
    object-fit: contain;
    object-position: center;
    display: block;
    flex-shrink: 0;
    filter: none;
    box-shadow: none;
  }

  #nav .nav-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  #nav .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    white-space: nowrap;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Sora', system-ui, sans-serif;
    font-weight: 700;
    transition: background-color 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    line-height: 1;
    letter-spacing: 0.01em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transform: none;
  }

  #nav .btn-sm {
    height: 40px;
    min-height: 40px;
    padding: 0 20px;
    font-size: 0.8375rem;
    font-weight: 700;
  }

  #nav #nav-link-why { width: 110px; }
  #nav #nav-link-features { width: 106px; }
  #nav #nav-link-pricing { width: 102px; }
  #nav #nav-link-account,
  #nav #auth-btn { width: 118px; }
  #nav .btn.btn-primary.btn-sm { width: 146px; }

  #nav #auth-btn,
  #nav #mobile-auth-link { visibility: hidden; }

  #nav.nav-auth-ready #auth-btn,
  #nav.nav-auth-ready #mobile-auth-link { visibility: visible; }

  #nav .btn-ghost {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(240, 244, 255, 0.76);
    border: 2px solid rgba(255, 255, 255, 0.14);
  }

  #nav .btn-ghost.nav-progress-pill {
    position: relative;
    overflow: hidden;
    isolation: isolate;
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.12);
  }

  #nav .btn-ghost.nav-progress-pill::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: var(--nav-pill-fill, 0%);
    border-radius: 999px;
    background: rgba(24, 43, 78, 0.58);
    transition: width 0.28s cubic-bezier(0.22, 1, 0.36, 1), background 0.2s ease;
    z-index: -1;
  }

  #nav .btn-ghost.nav-progress-pill::after {
    display: none;
  }

  #nav .btn-ghost.nav-progress-pill.nav-progress-active {
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.28);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
  }

  #nav .btn-ghost.nav-progress-pill.nav-progress-active::before,
  #nav .btn-ghost.nav-progress-pill.nav-progress-complete::before {
    background: rgba(31, 53, 95, 0.72);
  }

  #nav .btn-ghost.nav-progress-pill.nav-progress-complete {
    color: rgba(255, 255, 255, 0.92);
    border-color: rgba(255, 255, 255, 0.22);
  }

  #nav .btn-ghost:hover {
    background: rgba(255, 255, 255, 0.14);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.32);
  }

  #nav .btn-primary {
    background: #f59e0b;
    color: #fff;
    box-shadow: 0 4px 20px rgba(245, 158, 11, 0.35);
  }

  #nav .btn-primary:hover {
    background: #fbbf24;
    transform: none;
    box-shadow: 0 8px 30px rgba(245, 158, 11, 0.45);
  }

  #nav .nav-link-hide { display: none; }

  #nav .mobile-menu-wrap {
    display: none;
    position: relative;
  }

  #nav .mobile-menu-btn {
    height: 40px;
    min-height: 40px;
    padding: 0 14px;
    border-radius: 999px;
    font-size: 0.8125rem;
    font-weight: 700;
    border: 2px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.08);
    color: rgba(240, 244, 255, 0.76);
  }

  #nav .mobile-menu-panel {
    position: absolute;
    right: 0;
    top: 48px;
    min-width: 220px;
    background: #1c2333;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.22);
    padding: 8px;
    display: none;
    z-index: 30;
  }

  #nav .mobile-menu-panel.open { display: block; }

  #nav .mobile-menu-link {
    display: block;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 700;
    color: rgba(240, 244, 255, 0.88);
    text-decoration: none;
  }

  #nav .mobile-menu-link:hover { background: rgba(255, 255, 255, 0.06); }

  #nav.nav-context-default #nav-link-why,
  #nav.nav-context-default #nav-link-features,
  #nav.nav-context-default #nav-link-pricing,
  #nav.nav-context-default #nav-m-link-why,
  #nav.nav-context-default #nav-m-link-features,
  #nav.nav-context-default #nav-m-link-pricing,
  #nav.nav-context-account #nav-link-why,
  #nav.nav-context-account #nav-link-features,
  #nav.nav-context-account #nav-link-pricing,
  #nav.nav-context-account #nav-m-link-why,
  #nav.nav-context-account #nav-m-link-features,
  #nav.nav-context-account #nav-m-link-pricing,
  #nav.nav-context-study #nav-link-pricing,
  #nav.nav-context-study #nav-link-features,
  #nav.nav-context-study #auth-btn,
  #nav.nav-context-study #nav-m-link-pricing,
  #nav.nav-context-study #nav-m-link-features,
  #nav.nav-context-study #mobile-auth-link,
  #nav.nav-context-test #nav-link-why,
  #nav.nav-context-test #nav-link-features,
  #nav.nav-context-test #nav-link-pricing,
  #nav.nav-context-test #nav-m-link-why,
  #nav.nav-context-test #nav-m-link-features,
  #nav.nav-context-test #nav-m-link-pricing {
    display: none !important;
  }

  #nav.nav-context-default .nav-right,
  #nav.nav-context-account .nav-right,
  #nav.nav-context-study .nav-right,
  #nav.nav-context-test .nav-right {
    width: 402px;
    max-width: 100%;
    justify-content: flex-end;
  }

  @media (min-width: 640px) {
    #nav .nav-link-hide { display: inline-flex; }
  }

  @media (max-width: 860px) {
    #nav .nav-right > .btn.btn-ghost.btn-sm:not(#auth-btn):not(.mobile-menu-btn),
    #nav .nav-right > #auth-btn,
    #nav .nav-right > .btn.btn-primary.btn-sm {
      display: none;
    }

    #nav .mobile-menu-wrap { display: block; }
  }
</style>

<nav id="nav" class="nav-context-default" aria-label="Main navigation">
  <div class="wrap nav-inner">
    <a href="/" class="nav-logo">
      <img src="/assets/budy-logo.png" alt="Budy logo" class="nav-logo-img">
      <span class="nav-logo-wordmark">Budy<span class="nav-logo-study">.Study</span></span>
    </a>
    <div class="nav-right">
      <a href="/#features" class="btn btn-ghost btn-sm nav-link-hide nav-progress-pill" id="nav-link-why">Why Budy?</a>
      <a href="/#pricing" class="btn btn-ghost btn-sm nav-link-hide nav-progress-pill" id="nav-link-pricing">Pricing</a>
      <a href="/#solutions" class="btn btn-ghost btn-sm nav-link-hide nav-progress-pill" id="nav-link-features">Features</a>
      <a class="btn btn-ghost btn-sm" href="/my-account.html" id="nav-link-account">Dashboard</a>
      <button class="btn btn-ghost btn-sm" id="auth-btn" onclick="handleAuthButton()">Log In</button>
      <button class="btn btn-primary btn-sm" onclick="openOnboard()" data-start-cta data-free-text="Start Test" data-premium-text="Start Test">Start Test</button>
      <div class="mobile-menu-wrap">
        <button class="btn btn-primary btn-sm" onclick="openOnboard()" data-start-cta data-free-text="Start Test" data-premium-text="Start Test">Start Test</button>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">Menu ▾</button>
        <div class="mobile-menu-panel" id="mobile-menu-panel">
          <a class="mobile-menu-link" href="/#features" onclick="closeMobileMenu()" id="nav-m-link-why">Why Budy?</a>
          <a class="mobile-menu-link" href="/#pricing" onclick="closeMobileMenu()" id="nav-m-link-pricing">Pricing</a>
          <a class="mobile-menu-link" href="/#solutions" onclick="closeMobileMenu()" id="nav-m-link-features">Features</a>
          <a class="mobile-menu-link" href="/my-account.html" onclick="closeMobileMenu()" id="nav-m-link-account">Dashboard</a>
          <a class="mobile-menu-link" href="/login.html" onclick="closeMobileMenu()" id="mobile-auth-link">Log In</a>
        </div>
      </div>
    </div>
  </div>
</nav>
