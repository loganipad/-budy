<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Budy.Study | Study Guide Viewer</title>
<meta name="description" content="Full-size study guide viewer with download access.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d1117;
  --panel:rgba(20,29,45,.82);
  --line:rgba(255,255,255,.12);
  --text:#f8fafc;
  --muted:rgba(240,244,255,.72);
  --brand:#1a56db;
  --gold:#f59e0b;
  --shadow:0 26px 80px rgba(0,0,0,.34);
  --font:'Sora',system-ui,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ink);color:var(--text);font-family:var(--font)}
body{
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% -12%, rgba(26,86,219,.34) 0%, transparent 60%),
    radial-gradient(ellipse 42% 28% at 18% 72%, rgba(245,158,11,.08) 0%, transparent 60%),
    radial-gradient(ellipse 42% 30% at 86% 80%, rgba(37,99,235,.12) 0%, transparent 58%);
}

.wrap{
  width:min(1260px,calc(100% - 56px));
  margin:0 auto;
}

.viewer-main{
  min-height:calc(100vh - var(--shared-nav-h, 64px));
  padding:calc(var(--shared-nav-h, 64px) + env(safe-area-inset-top, 0px) + 10px) 0 12px;
}

.viewer-wrap{
  width:min(1740px,100%);
  margin:0 auto;
  display:block;
}

.viewer-shell{
  position:relative;
  width:100%;
  min-height:0;
  display:flex;
  padding:0;
}

.viewer-frame-wrap{
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.14);
  background:#0b1020;
  width:100%;
  min-height:0;
  height:clamp(760px, calc(100vh - 120px), 1800px);
}

.viewer-frame{
  width:100%;
  height:100%;
  border:none;
  background:#fff;
}

.viewer-download{
  position:absolute;
  top:20px;
  right:20px;
  width:42px;
  height:42px;
  border-radius:12px;
  border:1px solid rgba(245,158,11,.72);
  background:linear-gradient(135deg,#facc15 0%,#f59e0b 100%);
  color:#fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 12px 28px rgba(245,158,11,.34);
  text-decoration:none;
}

.viewer-back{
  position:absolute;
  top:20px;
  left:20px;
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(8,12,22,.64);
  color:#e2e8f0;
  font-size:.8rem;
  font-weight:700;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  white-space:nowrap;
  backdrop-filter:blur(8px);
}

.viewer-download:hover{transform:translateY(-1px)}
.viewer-download svg{width:18px;height:18px;display:block}

.viewer-completion-pill{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  min-height:38px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.3);
  background:rgba(148,163,184,.16);
  color:rgba(241,245,249,.9);
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.01em;
  display:inline-flex;
  align-items:center;
  white-space:nowrap;
  backdrop-filter:blur(8px);
}

.viewer-completion-pill.is-neutral{background:rgba(148,163,184,.16);border-color:rgba(148,163,184,.3);color:rgba(241,245,249,.9)}
.viewer-completion-pill.is-red{background:rgba(239,68,68,.22);border-color:rgba(239,68,68,.52);color:#fecaca}
.viewer-completion-pill.is-yellow{background:rgba(245,158,11,.22);border-color:rgba(245,158,11,.5);color:#fde68a}
.viewer-completion-pill.is-green{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.48);color:#bbf7d0}

.viewer-error{
  border-radius:18px;
  border:1px solid rgba(244,63,94,.35);
  background:rgba(127,29,29,.24);
  color:#fecdd3;
  padding:14px;
  margin-top:8px;
  font-size:.9rem;
  line-height:1.55;
}

/* Compact footer footprint on the dedicated viewer page only. */
#footer-slot footer.site-footer{
  padding:24px 0 12px;
}

#footer-slot .site-footer .footer-shell{
  padding-top:12px;
}

#footer-slot .site-footer .footer-grid{
  column-gap:24px;
  row-gap:12px;
  margin-bottom:8px;
}

#footer-slot .site-footer .footer-brand{
  gap:6px;
}

#footer-slot .site-footer .footer-brand-desc{
  font-size:.82rem;
  line-height:1.45;
}

#footer-slot .site-footer .footer-col h4{
  margin-bottom:10px;
}

#footer-slot .site-footer .footer-col ul{
  gap:6px;
}

#footer-slot .site-footer .footer-socials{
  gap:10px;
}

#footer-slot .site-footer .footer-social{
  width:42px;
  height:42px;
  border-radius:11px;
}

#footer-slot .site-footer .footer-social svg{
  width:18px;
  height:18px;
}

#footer-slot .site-footer .footer-copy{
  font-size:.72rem;
}

@media (max-width: 860px){
  .wrap{width:min(100%,calc(100% - 24px))}
  .viewer-main{padding:calc(var(--shared-nav-h, 64px) + env(safe-area-inset-top, 0px) + 8px) 0 10px}
  .viewer-shell{padding:0}
  .viewer-frame-wrap{border-radius:10px;height:calc(100vh - 128px);min-height:560px}
  .viewer-back{left:14px;top:14px}
  .viewer-download{top:18px;right:18px}
  .viewer-completion-pill{top:14px;min-height:34px;font-size:.72rem;padding:0 12px}

  #footer-slot footer.site-footer{
    padding:18px 0 10px;
  }

  #footer-slot .site-footer .footer-grid{
    gap:10px;
  }
}
</style>
</head>
<body data-page-type="study">
  <div id="navbar-slot"></div>
  <script src="/assets/layout/navbar-loader.js" defer></script>

  <main class="viewer-main">
    <section class="viewer-wrap wrap">
      <div class="viewer-shell">
        <a class="viewer-back" href="/study.html" id="viewer-back">Back to Study Hub</a>
        <div class="viewer-completion-pill" id="viewer-completion">Not started</div>
        <a class="viewer-download" id="viewer-download" href="#" aria-label="Download study guide PDF" download>
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 4v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="m8 11 4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 19h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </a>
        <div class="viewer-frame-wrap">
          <iframe class="viewer-frame" id="viewer-frame" title="Study guide PDF viewer" loading="lazy"></iframe>
        </div>
      </div>
      <div class="viewer-error" id="viewer-error" hidden>Unable to load this study guide. Return to the Study Hub and open it again.</div>
    </section>
  </main>

  <div id="footer-slot"></div>
  <script src="/assets/layout/footer-loader.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    (function () {
      var STUDY_GUIDE_PROGRESS_KEY = 'budy_study_guide_progress_v1';

      function sanitizePdfPath(rawPath) {
        if (!rawPath) return '';
        var value = String(rawPath).trim();
        if (!value) return '';
        if (value.indexOf('..') !== -1) return '';
        if (value.slice(0, 19) !== '/data/study-guides/') return '';
        if (!/\.pdf$/i.test(value)) return '';
        return value;
      }

      function basename(path) {
        var parts = String(path || '').split('/');
        return parts[parts.length - 1] || 'study-guide.pdf';
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function parsePdfPageFromHash(rawHash) {
        var hash = String(rawHash || '').replace(/^#/, '');
        if (!hash) return 0;
        var params = new URLSearchParams(hash);
        var page = Number(params.get('page') || 0);
        return Number.isFinite(page) && page > 0 ? Math.floor(page) : 0;
      }

      function ensurePdfJsWorker() {
        if (!window.pdfjsLib || !window.pdfjsLib.GlobalWorkerOptions) return;
        if (window.pdfjsLib.GlobalWorkerOptions.workerSrc) return;
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
      }

      function readStore() {
        try {
          var raw = localStorage.getItem(STUDY_GUIDE_PROGRESS_KEY);
          var parsed = raw ? JSON.parse(raw) : { guides: {} };
          if (!parsed || typeof parsed !== 'object') return { guides: {} };
          if (!parsed.guides || typeof parsed.guides !== 'object') parsed.guides = {};
          return parsed;
        } catch (_) {
          return { guides: {} };
        }
      }

      function writeStore(store) {
        try {
          localStorage.setItem(STUDY_GUIDE_PROGRESS_KEY, JSON.stringify(store));
        } catch (_) {}
      }

      function getProgress(pdfPath) {
        var key = String(pdfPath || '').trim();
        if (!key) return null;
        var store = readStore();
        var item = store.guides[key];
        if (!item || typeof item !== 'object') return null;
        var lastPage = Math.max(0, Math.floor(Number(item.lastPage || 0)));
        var totalPages = Math.max(0, Math.floor(Number(item.totalPages || 0)));
        var percent = totalPages > 0
          ? Math.round((Math.min(lastPage, totalPages) / totalPages) * 100)
          : Math.round(Number(item.percent || 0));
        return {
          lastPage: lastPage,
          totalPages: totalPages,
          percent: clamp(percent, 0, 100)
        };
      }

      function setProgress(pdfPath, update) {
        var key = String(pdfPath || '').trim();
        if (!key) return null;
        var current = getProgress(key) || { lastPage: 0, totalPages: 0, percent: 0 };
        var lastPage = Math.max(0, Math.floor(Number(update && update.lastPage != null ? update.lastPage : current.lastPage)));
        var totalPages = Math.max(0, Math.floor(Number(update && update.totalPages != null ? update.totalPages : current.totalPages)));
        var percent = update && update.percent != null
          ? Number(update.percent)
          : (totalPages > 0 ? Math.round((Math.min(lastPage, totalPages) / totalPages) * 100) : current.percent);
        var next = {
          lastPage: lastPage,
          totalPages: totalPages,
          percent: clamp(Math.round(percent || 0), 0, 100),
          updatedAt: new Date().toISOString()
        };
        var store = readStore();
        store.guides[key] = next;
        writeStore(store);
        return next;
      }

      function getColorClass(percent) {
        var value = clamp(Number(percent || 0), 0, 100);
        if (value >= 67) return 'is-green';
        if (value >= 34) return 'is-yellow';
        return 'is-red';
      }

      function paintCompletion(node, progress) {
        if (!node) return;
        var hasProgress = Boolean(progress) && (
          Number(progress && progress.lastPage || 0) > 0 ||
          Number(progress && progress.percent || 0) > 0
        );
        node.classList.remove('is-neutral', 'is-red', 'is-yellow', 'is-green');
        if (!hasProgress) {
          node.textContent = 'Not started';
          node.classList.add('is-neutral');
          return;
        }
        var pct = clamp(Math.round(Number(progress && progress.percent != null ? progress.percent : 0)), 0, 100);
        node.textContent = pct + '% Completed';
        node.classList.add(getColorClass(pct));
      }

      function fetchTotalPages(pdfPath) {
        if (!pdfPath || !window.pdfjsLib || typeof window.pdfjsLib.getDocument !== 'function') {
          return Promise.resolve(0);
        }
        ensurePdfJsWorker();
        return window.pdfjsLib.getDocument({ url: pdfPath }).promise
          .then(function (doc) {
            var count = Math.max(0, Math.floor(Number(doc && doc.numPages ? doc.numPages : 0)));
            if (doc && typeof doc.destroy === 'function') {
              doc.destroy();
            }
            return count;
          })
          .catch(function () { return 0; });
      }

      var params = new URLSearchParams(window.location.search);
      var pdfPath = sanitizePdfPath(params.get('pdf'));
      var title = String(params.get('title') || '').trim();
      var requestedDownload = String(params.get('download') || '').trim();

      var frame = document.getElementById('viewer-frame');
      var downloadBtn = document.getElementById('viewer-download');
      var error = document.getElementById('viewer-error');
      var backBtn = document.getElementById('viewer-back');
      var completionNode = document.getElementById('viewer-completion');
      var trackerInterval = 0;
      var knownTotalPages = 0;
      var trackedPage = 0;

      if (title && backBtn) {
        backBtn.setAttribute('aria-label', 'Back to Study Hub from ' + title);
      }

      if (!pdfPath) {
        if (frame) frame.removeAttribute('src');
        if (downloadBtn) {
          downloadBtn.setAttribute('aria-disabled', 'true');
          downloadBtn.style.pointerEvents = 'none';
          downloadBtn.style.opacity = '0.45';
        }
        if (error) error.hidden = false;
        return;
      }

      var existing = getProgress(pdfPath);
      var startPage = Math.max(1, Number(existing && existing.lastPage ? existing.lastPage : 1));
      if (existing && existing.totalPages) {
        knownTotalPages = Number(existing.totalPages || 0);
      }
      paintCompletion(completionNode, existing || { percent: 0 });

      var downloadName = requestedDownload && /\.pdf$/i.test(requestedDownload)
        ? requestedDownload
        : basename(pdfPath);

      frame.src = pdfPath + '#navpanes=0&view=FitH&zoom=page-width&page=' + String(startPage);
      downloadBtn.href = pdfPath;
      downloadBtn.download = downloadName;
      downloadBtn.addEventListener('click', function () {
        var total = Math.max(1, Number(knownTotalPages || (existing && existing.totalPages) || 1));
        var next = setProgress(pdfPath, { lastPage: total, totalPages: total, percent: 100 });
        paintCompletion(completionNode, next || { percent: 100 });
      });

      function commitPage(page) {
        if (!page) return;
        trackedPage = page;
        var next = setProgress(pdfPath, {
          lastPage: page,
          totalPages: knownTotalPages || undefined
        });
        paintCompletion(completionNode, next);
      }

      function samplePage() {
        var page = 0;
        try {
          page = parsePdfPageFromHash(frame.contentWindow && frame.contentWindow.location ? frame.contentWindow.location.hash : '');
        } catch (_) {
          page = 0;
        }
        if (!page) {
          page = parsePdfPageFromHash(frame.src && frame.src.indexOf('#') !== -1 ? frame.src.slice(frame.src.indexOf('#')) : '');
        }
        if (page && page !== trackedPage) {
          commitPage(page);
        }
      }

      frame.addEventListener('load', samplePage);
      trackerInterval = window.setInterval(samplePage, 900);
      window.addEventListener('beforeunload', samplePage);

      fetchTotalPages(pdfPath).then(function (count) {
        if (!count) return;
        knownTotalPages = count;
        var basePage = Math.max(trackedPage, startPage);
        var next = setProgress(pdfPath, { lastPage: basePage, totalPages: count });
        paintCompletion(completionNode, next);
      });

      document.title = 'Budy.Study | ' + (title || 'Study Guide');
    })();
  </script>
</body>
</html>
